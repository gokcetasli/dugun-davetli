<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Düğün Davetli Yöneticisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FAF7F2;
  --warm-white: #FFFDF9;
  --blush: #E8C4B8;
  --blush-light: #F5E6E0;
  --blush-dark: #C49082;
  --mauve: #9B7B8A;
  --mauve-dark: #6D4F5E;
  --plum: #3D2535;
  --sage: #8FAF8A;
  --sage-light: #D4E8D0;
  --gold: #C8A96E;
  --gold-light: #F0E4C8;
  --text: #2A1A22;
  --text-muted: #7A6070;
  --border: rgba(61,37,53,0.12);
  --shadow: 0 4px 24px rgba(61,37,53,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* HEADER */
.header {
  background: var(--plum);
  padding: 28px 32px 24px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(200,169,110,0.15);
}
.header-inner { position: relative; max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-title { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 26px; font-weight: 400; }
.header-title span { color: var(--gold); font-style: italic; }
.header-dates { display: flex; gap: 16px; }
.date-chip { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: rgba(250,247,242,0.85); font-weight: 300; letter-spacing: 0.03em; }

/* NAV TABS */
.nav {
  background: var(--warm-white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  position: sticky; top: 0; z-index: 10;
}
.nav-inner { max-width: 960px; margin: 0 auto; display: flex; gap: 0; }
.nav-btn {
  padding: 16px 20px;
  background: none; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--plum); border-bottom-color: var(--blush-dark); }

/* MAIN */
.main { max-width: 960px; margin: 0 auto; padding: 32px; }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-num { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--plum); }
.stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.section-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--plum); }
.section-header h2 em { font-style: italic; color: var(--mauve); }

/* CARD */
.card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.card-header {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  background: var(--warm-white);
  transition: background 0.15s;
}
.card-header:hover { background: var(--cream); }
.card-header-left { display: flex; align-items: center; gap: 10px; }
.card-header-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.icon-kina { background: var(--blush-light); }
.icon-nikah { background: #EDE8F5; }
.icon-aile { background: var(--gold-light); }
.icon-arkadaslar { background: var(--sage-light); }
.icon-is { background: #E8EEF5; }
.group-name { font-weight: 500; font-size: 15px; }
.group-count { font-size: 12px; color: var(--text-muted); background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 2px 10px; }
.card-body { padding: 20px; display: none; }
.card-body.open { display: block; }

/* PERSON TAGS */
.person-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 32px; }
.person-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px; font-size: 13px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
.person-tag .del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; padding: 0; }
.person-tag .del:hover { color: #A32D2D; }

/* ADD PERSON FORM */
.add-person { display: flex; gap: 8px; }
.add-person input {
  flex: 1; padding: 9px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  background: var(--cream); color: var(--text);
  outline: none; transition: border-color 0.15s;
}
.add-person input:focus { border-color: var(--blush-dark); }
.add-person input::placeholder { color: var(--text-muted); }
.btn-sm {
  padding: 9px 16px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--plum); color: var(--cream);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
}
.btn-sm:hover { opacity: 0.85; }
.btn-outline {
  background: transparent; color: var(--plum); border-color: var(--blush-dark);
}
.btn-outline:hover { background: var(--blush-light); opacity: 1; }

/* ADD GROUP FORM */
.add-group-form {
  background: var(--cream); border: 1px dashed var(--blush-dark);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.add-group-form input {
  flex: 1; min-width: 180px; padding: 9px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  background: var(--warm-white); color: var(--text); outline: none;
}
.add-group-form input:focus { border-color: var(--blush-dark); }
.add-group-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

/* TABLE */
.tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; background: var(--cream); color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; border-bottom: 1px solid var(--border); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--cream); }
select.inline-sel {
  border: none; background: transparent; font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--text); cursor: pointer; padding: 2px;
  outline: none;
}
select.inline-sel:focus { outline: 1px solid var(--blush-dark); border-radius: 4px; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.b-yes  { background: var(--sage-light); color: #2A5226; }
.b-no   { background: #FAEBEB; color: #7A2020; }
.b-wait { background: var(--gold-light); color: #6A4A10; }
.b-kina  { background: var(--blush-light); color: var(--mauve-dark); }
.b-nikah { background: #EDE8F5; color: #4A3570; }
.b-both  { background: var(--sage-light); color: #2A5A26; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; padding: 4px 8px; border-radius: 6px; }
.del-btn:hover { background: #FAEBEB; color: #A32D2D; }

/* SEARCH ROW */
.search-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.search-row input, .search-row select {
  padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  background: var(--warm-white); color: var(--text); outline: none;
}
.search-row input { flex: 1; min-width: 180px; }
.search-row input:focus, .search-row select:focus { border-color: var(--blush-dark); }

/* TOOLBAR */
.toolbar { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
.empty .big { font-size: 32px; margin-bottom: 8px; }

/* ADD FORM CARD */
.add-form-card {
  background: var(--warm-white); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; margin-bottom: 24px;
}
.add-form-card h3 { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 16px; color: var(--plum); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-field label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 5px; }
.form-field input, .form-field select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  background: var(--cream); color: var(--text); outline: none;
}
.form-field input:focus, .form-field select:focus { border-color: var(--blush-dark); }

/* SUMMARY */
.summary-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.sum-col { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
.sum-col-title { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--plum); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.sum-group { margin-bottom: 14px; }
.sum-group-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
.sum-person { font-size: 13px; padding: 2px 0; color: var(--text); }
.sum-total { padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
.sum-total-lbl { font-size: 12px; color: var(--text-muted); }
.sum-total-num { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--plum); }

@media (max-width: 600px) {
  .main { padding: 16px; }
  .header { padding: 20px 16px; }
  .nav { padding: 0 16px; }
  .form-grid, .form-grid-3, .summary-cols { grid-template-columns: 1fr; }
  .header-inner { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">Düğün <span>Davetli</span> Yöneticisi</div>
    <div class="header-dates">
      <span class="date-chip">❤️ Kına · 2 Temmuz</span>
      <span class="date-chip">💎 Nikah · 4 Temmuz</span>
    </div>
  </div>
</div>

<div class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showPanel('planner')">Liste Planla</button>
    <button class="nav-btn" onclick="showPanel('tracker')">Katılım Takibi</button>
    <button class="nav-btn" onclick="showPanel('summary')">Özet</button>
  </div>
</div>

<div class="main">

  <!-- PLANNER PANEL -->
  <div class="panel active" id="panel-planner">
    <div class="section-header">
      <h2>Grup <em>listelerini</em> oluştur</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-outline" onclick="showAddGroup('kina')">+ Kına grubu</button>
        <button class="btn-sm btn-outline" onclick="showAddGroup('nikah')">+ Nikah grubu</button>
      </div>
    </div>

    <div id="add-group-form" style="display:none">
      <div class="add-group-form">
        <span class="add-group-label" id="add-group-label">Yeni grup:</span>
        <input type="text" id="new-group-inp" placeholder="Grup adı..." onkeydown="if(event.key==='Enter')saveNewGroup()" />
        <button class="btn-sm" onclick="saveNewGroup()">Ekle</button>
        <button class="btn-sm btn-outline" onclick="document.getElementById('add-group-form').style.display='none'">İptal</button>
      </div>
    </div>

    <div id="groups-container"></div>

    <div style="text-align:center;margin-top:24px">
      <button class="btn-sm" onclick="showPanel('tracker')">Listeyi tamamladım → Katılım takibine geç</button>
    </div>
  </div>

  <!-- TRACKER PANEL -->
  <div class="panel" id="panel-tracker">
    <div class="stats" id="stats-bar"></div>

    <div class="add-form-card">
      <h3>Yeni davetli ekle</h3>
      <div class="form-grid">
        <div class="form-field"><label>Ad Soyad</label><input type="text" id="t-name" placeholder="Ayşe Yılmaz" /></div>
        <div class="form-field"><label>Telefon</label><input type="text" id="t-phone" placeholder="05XX XXX XX XX" /></div>
      </div>
      <div class="form-grid-3">
        <div class="form-field"><label>Etkinlik</label>
          <select id="t-event">
            <option value="kina">Kına (2 Tem)</option>
            <option value="nikah">Nikah (4 Tem)</option>
            <option value="both">Her İkisi</option>
          </select>
        </div>
        <div class="form-field"><label>Grup</label><select id="t-group"></select></div>
        <div class="form-field"><label>Davetiye</label>
          <select id="t-sent">
            <option value="no">Gönderilmedi</option>
            <option value="yes">Gönderildi</option>
          </select>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-field"><label>Katılım</label>
          <select id="t-status">
            <option value="wait">Cevap bekleniyor</option>
            <option value="yes">Geliyor ✓</option>
            <option value="no">Gelemiyor ✗</option>
          </select>
        </div>
        <div class="form-field"><label>Not</label><input type="text" id="t-note" placeholder="Opsiyonel..." /></div>
      </div>
      <button class="btn-sm" onclick="addGuest()">+ Ekle</button>
    </div>

    <div class="search-row">
      <input type="text" id="search" placeholder="İsim veya telefon ara..." oninput="renderTracker()" />
      <select id="f-evt" onchange="renderTracker()">
        <option value="">Tüm etkinlikler</option>
        <option value="kina">Kına</option>
        <option value="nikah">Nikah</option>
        <option value="both">Her İkisi</option>
      </select>
      <select id="f-grp" onchange="renderTracker()">
        <option value="">Tüm gruplar</option>
      </select>
      <select id="f-status" onchange="renderTracker()">
        <option value="">Tüm durumlar</option>
        <option value="yes">Geliyor</option>
        <option value="no">Gelemiyor</option>
        <option value="wait">Bekliyor</option>
      </select>
    </div>

    <div class="tbl-wrap" id="tracker-table"></div>

    <div class="toolbar" style="margin-top:16px">
      <button class="btn-sm btn-outline" onclick="exportCSV()">⬇ CSV indir</button>
      <button class="btn-sm btn-outline" onclick="importFromPlanner()">📋 Gruplardan aktar</button>
    </div>
  </div>

  <!-- SUMMARY PANEL -->
  <div class="panel" id="panel-summary">
    <div class="section-header">
      <h2><em>Özet</em></h2>
      <button class="btn-sm btn-outline" onclick="exportCSV()">⬇ CSV indir</button>
    </div>
    <div class="summary-cols" id="summary-content"></div>
    <div id="summary-stats" style="margin-top:8px"></div>
  </div>

</div>

<script>
let groups = {
  kina:  [
    { name: 'Aile', people: [] },
    { name: 'Yakın Arkadaşlar', people: [] },
    { name: 'İş Arkadaşları', people: [] },
  ],
  nikah: [
    { name: 'Aile', people: [] },
    { name: 'Yakın Arkadaşlar', people: [] },
    { name: 'İş Arkadaşları', people: [] },
    { name: 'Damadın Ailesi/Arkadaşları', people: [] },
  ]
};
let guests = [];
let addGroupEvt = 'kina';

const BIN_ID = '6a1d854fddf5aa59f77fd464';
const MASTER_KEY = '$2a$10$QxuxTJWPlLgwMU.opdOfOO9R4INlxI9jM.Bs/Y8WyLM/gghZkbeYK';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

function showSyncStatus(msg, color) {
  let el = document.getElementById('sync-status');
  if(!el) {
    el = document.createElement('div');
    el.id = 'sync-status';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:opacity 0.4s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = color === 'ok' ? '#D4E8D0' : color === 'err' ? '#FAEBEB' : '#F0E4C8';
  el.style.color = color === 'ok' ? '#2A5226' : color === 'err' ? '#7A2020' : '#6A4A10';
  el.style.opacity = '1';
  if(color !== 'loading') setTimeout(()=>{ el.style.opacity='0'; }, 2500);
}

async function load() {
  showSyncStatus('⏳ Yükleniyor...', 'loading');
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    const data = await res.json();
    const record = data.record;
    if(record.groups) {
      if(record.groups.kina && record.groups.kina.length > 0) groups = record.groups;
      else if(record.groups.nikah && record.groups.nikah.length > 0) groups = record.groups;
    }
    if(record.guests && record.guests.length > 0) guests = record.guests;
    showSyncStatus('✓ Yüklendi', 'ok');
  } catch(e) {
    showSyncStatus('⚠ Bağlantı hatası', 'err');
  }
}

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  showSyncStatus('⏳ Kaydediliyor...', 'loading');
  saveTimer = setTimeout(async () => {
    try {
      await fetch(BIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': MASTER_KEY
        },
        body: JSON.stringify({ groups, guests })
      });
      showSyncStatus('✓ Kaydedildi', 'ok');
    } catch(e) {
      showSyncStatus('⚠ Kayıt hatası', 'err');
    }
  }, 800);
}

/* PANEL NAV */
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  const btns = document.querySelectorAll('.nav-btn');
  const idx = ['planner','tracker','summary'].indexOf(name);
  if(btns[idx]) btns[idx].classList.add('active');
  if(name==='tracker') { renderStats(); renderTracker(); updateGroupSelect(); }
  if(name==='summary') renderSummary();
  if(name==='planner') renderGroups();
}

/* GROUP ICONS */
function groupIcon(name) {
  const n = name.toLowerCase();
  if(n.includes('aile')) return '👨‍👩‍👧';
  if(n.includes('arkadaş')) return '👭';
  if(n.includes('iş') || n.includes('is ')) return '💼';
  if(n.includes('damat') || n.includes('gelin')) return '💍';
  if(n.includes('komşu')) return '🏘';
  return '✦';
}

/* PLANNER */
function renderGroups() {
  const c = document.getElementById('groups-container');
  let html = '';
  ['kina','nikah'].forEach(evt => {
    const label = evt==='kina' ? '❤️ Kına — 2 Temmuz' : '💎 Nikah — 4 Temmuz';
    html += `<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <h3 style="font-family:'Playfair Display',serif;font-size:18px;color:var(--plum)">${label}</h3>
        <span style="font-size:12px;color:var(--text-muted)">${groups[evt].reduce((s,g)=>s+g.people.length,0)} kişi</span>
      </div>`;
    if(groups[evt].length===0) {
      html += `<div class="empty"><div class="big">✦</div>Henüz grup yok. Yukarıdan ekleyebilirsin.</div>`;
    }
    groups[evt].forEach((g,gi) => {
      const tags = g.people.map((p,pi) =>
        `<span class="person-tag">${p}<button class="del" onclick="removePerson('${evt}',${gi},${pi})">✕</button></span>`
      ).join('') || '<span style="font-size:12px;color:var(--text-muted)">Henüz kimse eklenmedi</span>';
      const bodyId = `body-${evt}-${gi}`;
      html += `<div class="card">
        <div class="card-header" onclick="toggleCard('${bodyId}')">
          <div class="card-header-left">
            <div class="card-header-icon">${groupIcon(g.name)}</div>
            <span class="group-name">${g.name}</span>
            <span class="group-count">${g.people.length} kişi</span>
          </div>
          <button onclick="event.stopPropagation();removeGroup('${evt}',${gi})" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:4px 8px;border-radius:6px" title="Grubu sil">✕</button>
        </div>
        <div class="card-body" id="${bodyId}">
          <div class="person-tags">${tags}</div>
          <div class="add-person">
            <input type="text" id="inp-${evt}-${gi}" placeholder="İsim ekle..." onkeydown="if(event.key==='Enter')addPerson('${evt}',${gi})" />
            <button class="btn-sm" onclick="addPerson('${evt}',${gi})">Ekle</button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  c.innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function addPerson(evt, gi) {
  const inp = document.getElementById(`inp-${evt}-${gi}`);
  const val = inp.value.trim(); if(!val) return;
  groups[evt][gi].people.push(val);
  save(); inp.value='';
  renderGroups();
  setTimeout(()=>{ const e=document.getElementById(`inp-${evt}-${gi}`); if(e){e.focus(); document.getElementById(`body-${evt}-${gi}`).classList.add('open');} },50);
}

function removePerson(evt, gi, pi) {
  groups[evt][gi].people.splice(pi,1);
  save(); renderGroups();
}

function removeGroup(evt, gi) {
  if(!confirm(`"${groups[evt][gi].name}" grubunu silmek istiyor musun?`)) return;
  groups[evt].splice(gi,1);
  save(); renderGroups();
}

function showAddGroup(evt) {
  addGroupEvt = evt;
  const label = evt==='kina' ? 'Kına için yeni grup:' : 'Nikah için yeni grup:';
  document.getElementById('add-group-label').textContent = label;
  document.getElementById('add-group-form').style.display = 'block';
  document.getElementById('new-group-inp').value = '';
  document.getElementById('new-group-inp').focus();
}

function saveNewGroup() {
  const val = document.getElementById('new-group-inp').value.trim(); if(!val) return;
  groups[addGroupEvt].push({ name: val, people: [] });
  save();
  document.getElementById('add-group-form').style.display='none';
  renderGroups();
}

/* TRACKER */
function updateGroupSelect() {
  const sel = document.getElementById('t-group');
  const fsel = document.getElementById('f-grp');
  const allGroups = [...new Set([...groups.kina.map(g=>g.name), ...groups.nikah.map(g=>g.name)])];
  sel.innerHTML = allGroups.map(g=>`<option value="${g}">${g}</option>`).join('');
  fsel.innerHTML = '<option value="">Tüm gruplar</option>' + allGroups.map(g=>`<option value="${g}">${g}</option>`).join('');
}

function addGuest() {
  const name = document.getElementById('t-name').value.trim();
  if(!name) { document.getElementById('t-name').focus(); return; }
  guests.push({
    id: Date.now(),
    name,
    phone: document.getElementById('t-phone').value.trim(),
    event: document.getElementById('t-event').value,
    group: document.getElementById('t-group').value,
    sent: document.getElementById('t-sent').value,
    status: document.getElementById('t-status').value,
    note: document.getElementById('t-note').value.trim(),
  });
  save();
  document.getElementById('t-name').value='';
  document.getElementById('t-phone').value='';
  document.getElementById('t-note').value='';
  renderStats(); renderTracker();
}

function deleteGuest(id) {
  guests = guests.filter(g=>g.id!==id);
  save(); renderStats(); renderTracker();
}

function updateGuest(id, field, val) {
  const g = guests.find(x=>x.id===id); if(g){ g[field]=val; save(); renderStats(); }
}

function renderStats() {
  const total = guests.length;
  const coming = guests.filter(g=>g.status==='yes').length;
  const waiting = guests.filter(g=>g.status==='wait').length;
  const notcoming = guests.filter(g=>g.status==='no').length;
  const noInvite = guests.filter(g=>g.sent==='no').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Toplam</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#2A5226">${coming}</div><div class="stat-lbl">Geliyor</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#6A4A10">${waiting}</div><div class="stat-lbl">Bekliyor</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#7A2020">${notcoming}</div><div class="stat-lbl">Gelemiyor</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4A3570">${noInvite}</div><div class="stat-lbl">Davetiyesiz</div></div>
  `;
}

function renderTracker() {
  const search = document.getElementById('search').value.toLowerCase();
  const fe = document.getElementById('f-evt').value;
  const fg = document.getElementById('f-grp').value;
  const fs = document.getElementById('f-status').value;
  const evtMap = { kina:'<span class="badge b-kina">Kına</span>', nikah:'<span class="badge b-nikah">Nikah</span>', both:'<span class="badge b-both">Her İkisi</span>' };
  const stMap = { yes:'yes', no:'no', wait:'wait' };

  const filtered = guests.filter(g => {
    if(fe && g.event!==fe) return false;
    if(fg && g.group!==fg) return false;
    if(fs && g.status!==fs) return false;
    if(search && !g.name.toLowerCase().includes(search) && !g.phone.includes(search)) return false;
    return true;
  });

  if(filtered.length===0) {
    document.getElementById('tracker-table').innerHTML='<div class="empty"><div class="big">✦</div>Davetli bulunamadı</div>';
    return;
  }

  let html=`<table><thead><tr>
    <th>Ad Soyad</th><th>Telefon</th><th>Etkinlik</th><th>Grup</th><th>Davetiye</th><th>Katılım</th><th>Not</th><th></th>
  </tr></thead><tbody>`;
  for(const g of filtered) {
    html+=`<tr>
      <td style="font-weight:500">${g.name}</td>
      <td style="color:var(--text-muted)">${g.phone||'—'}</td>
      <td>${evtMap[g.event]||''}</td>
      <td style="color:var(--text-muted)">${g.group||''}</td>
      <td><select class="inline-sel" onchange="updateGuest(${g.id},'sent',this.value)">
        <option value="no" ${g.sent==='no'?'selected':''}>Gönderilmedi</option>
        <option value="yes" ${g.sent==='yes'?'selected':''}>Gönderildi ✓</option>
      </select></td>
      <td><select class="inline-sel" onchange="updateGuest(${g.id},'status',this.value)">
        <option value="wait" ${g.status==='wait'?'selected':''}>⏳ Bekliyor</option>
        <option value="yes" ${g.status==='yes'?'selected':''}>✓ Geliyor</option>
        <option value="no" ${g.status==='no'?'selected':''}>✗ Gelemiyor</option>
      </select></td>
      <td style="color:var(--text-muted);font-size:12px">${g.note||''}</td>
      <td><button class="del-btn" onclick="deleteGuest(${g.id})">✕</button></td>
    </tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('tracker-table').innerHTML=html;
}

function importFromPlanner() {
  let added=0;
  ['kina','nikah'].forEach(evt => {
    groups[evt].forEach(grp => {
      grp.people.forEach(name => {
        const exists = guests.find(g=>g.name===name && g.event===evt);
        if(!exists) {
          guests.push({ id:Date.now()+Math.random(), name, phone:'', event:evt, group:grp.name, sent:'no', status:'wait', note:'' });
          added++;
        }
      });
    });
  });
  save(); renderStats(); renderTracker(); updateGroupSelect();
  if(added>0) alert(`${added} kişi eklendi!`); else alert('Tüm kişiler zaten tabloda.');
}

function exportCSV() {
  const rows=[['Ad Soyad','Telefon','Etkinlik','Grup','Davetiye','Katılım','Not']];
  const evtMap={kina:'Kına',nikah:'Nikah',both:'Her İkisi'};
  const stMap={yes:'Geliyor',no:'Gelemiyor',wait:'Bekliyor'};
  guests.forEach(g=>rows.push([g.name,g.phone,evtMap[g.event]||g.event,g.group,g.sent==='yes'?'Gönderildi':'Gönderilmedi',stMap[g.status]||g.status,g.note||'']));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='davetliler.csv'; a.click();
}

/* SUMMARY */
function renderSummary() {
  let html='';
  ['kina','nikah'].forEach(evt=>{
    const label = evt==='kina' ? '❤️ Kına — 2 Temmuz' : '💎 Nikah — 4 Temmuz';
    const total = groups[evt].reduce((s,g)=>s+g.people.length,0);
    let ghtml = groups[evt].map(g=>{
      if(g.people.length===0) return `<div class="sum-group"><div class="sum-group-name">${g.name}</div><div style="font-size:12px;color:var(--text-muted);font-style:italic">Henüz kimse yok</div></div>`;
      return `<div class="sum-group"><div class="sum-group-name">${g.name} (${g.people.length})</div>${g.people.map(p=>`<div class="sum-person">· ${p}</div>`).join('')}</div>`;
    }).join('');
    html+=`<div class="sum-col"><div class="sum-col-title">${label}</div>${ghtml}<div class="sum-total"><span class="sum-total-lbl">Toplam</span><span class="sum-total-num">${total} kişi</span></div></div>`;
  });
  document.getElementById('summary-content').innerHTML=html;

  const kTotal=groups.kina.reduce((s,g)=>s+g.people.length,0);
  const nTotal=groups.nikah.reduce((s,g)=>s+g.people.length,0);
  const gComing=guests.filter(g=>g.status==='yes').length;
  const gWait=guests.filter(g=>g.status==='wait').length;
  document.getElementById('summary-stats').innerHTML=`
    <div class="stats">
      <div class="stat-card"><div class="stat-num">${kTotal}</div><div class="stat-lbl">Kına davetlisi</div></div>
      <div class="stat-card"><div class="stat-num">${nTotal}</div><div class="stat-lbl">Nikah davetlisi</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#2A5226">${gComing}</div><div class="stat-lbl">Onaylayan</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#6A4A10">${gWait}</div><div class="stat-lbl">Cevap bekliyor</div></div>
    </div>`;
}

load().then(() => {
  renderGroups();
  renderStats();
});
</script>
</body>
</html>
